hero_image: "images/hero/leadership-hero.jpg"
hero_subtitle: "A dedicated team guiding the school with professionalism, integrity, and service."
principal:
  name: "Ali H. Ali"
  title: "Senior Principal"
  photo: "images/leadership/principal_ali_h_ali.jpg"
  bio: "It is my honor and privilege to welcome you to Mavoko Boys' School, a center of academic excellence and holistic development. Our dedicated team of educators is committed to nurturing every student's potential, fostering discipline, and building character. We believe in preparing our learners not just for examinations, but for life. Together with parents and the community, we strive to create an environment where every boy can thrive, excel, and become a responsible citizen. Welcome to our school family."
  quote: "We are committed to nurturing every student's potential and building a community where excellence is lived every day."
deputies:
  - name: "Stella Maris Obed"
    title: "Deputy Principal, Administration"
    photo: "images/leadership/deputy_admin_stella_maris.jpg"
    bio: "Dedicated to maintaining discipline, overseeing school administration, and fostering holistic student development. With years of experience in educational leadership, Stella Maris ensures smooth day-to-day operations and a conducive learning environment."
  - name: "Penninah Nzioki"
    title: "Deputy Principal, Academics"
    photo: "images/leadership/deputy_academics_penninah_nzioki.jpg"
    bio: "Committed to academic excellence, curriculum implementation, and driving student performance outcomes. Penninah works closely with the Dean of studies and Heads of Departments to ensure quality teaching and learning across all subjects."
bom_chair:
  name: "Justine Mbula"
  title: "Chairperson, Board of Management"
  photo: "images/leadership/bom_chair_justine_mbula.jpg"
  message: "We remain committed to supporting the school's vision through sound governance, strategic guidance, and a shared dedication to the boys' holistic growth and academic success."
pa_status: "Parents Association Chairperson — position currently vacant, election in progress."
