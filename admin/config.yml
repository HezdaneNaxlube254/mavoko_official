backend:
  name: git-gateway
  branch: main # Or 'master' depending on your repository default

# These lines tell Netlify where to store the YAML data and media
media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  # --------------------------------------------
  # 1. GLOBAL SETTINGS (Includes Header & Footer logos)
  # --------------------------------------------
  - name: "settings"
    label: "Global Settings"
    files:
      - name: "settings"
        label: "Site Settings"
        file: "content/settings.yml"
        fields:
          - { label: "School Name", name: "school_name", widget: "string" }
          - { label: "Short Name", name: "short_name", widget: "string" }
          - { label: "Motto", name: "motto", widget: "string" }
          - { label: "Motto Quote", name: "motto_quote", widget: "text" }
          - { label: "Vision", name: "vision", widget: "text" }
          - { label: "Mission", name: "mission", widget: "text" }
          - { label: "Location", name: "location", widget: "string" }
          - { label: "Address (P.O. Box)", name: "address", widget: "string" }
          - { label: "Postal Address", name: "postal_address", widget: "string" }
          - { label: "Phone Number", name: "phone", widget: "string" }
          - { label: "WhatsApp Number (without +)", name: "whatsapp", widget: "string" }
          - { label: "Display Email", name: "display_email", widget: "string" }
          - { label: "Email (mailto link)", name: "email", widget: "string" }
          - { label: "Facebook URL", name: "facebook_url", widget: "string", required: false }
          - { label: "Twitter URL", name: "twitter_url", widget: "string", required: false }
          - { label: "Instagram URL", name: "instagram_url", widget: "string", required: false }
          - { label: "YouTube URL", name: "youtube_url", widget: "string", required: false }
          - { label: "LinkedIn URL", name: "linkedin_url", widget: "string", required: false }
          - { label: "Header Logo (Top Nav)", name: "header_logo", widget: "image", default: "images/branding/logo_placeholder.png" }
          - { label: "Footer Logo (Bottom)", name: "footer_logo", widget: "image", default: "images/branding/logo_placeholder(2).png" }
          - { label: "Favicon", name: "favicon", widget: "image", default: "images/branding/favicon.png" }
          - { label: "Hero Images (Carousel)", name: "hero_images", widget: "list", fields: [
              { label: "Image", name: "image", widget: "image" },
              { label: "Alt Text", name: "alt_text", widget: "string" },
              { label: "Caption (Eyebrow)", name: "caption", widget: "string" },
              { label: "Caption Text (Heading)", name: "caption_text", widget: "string" }
            ] }

  # --------------------------------------------
  # 2. HOMEPAGE
  # --------------------------------------------
  - name: "homepage"
    label: "Homepage"
    files:
      - name: "homepage"
        label: "Homepage Content"
        file: "content/homepage.yml"
        fields:
          - label: "Stats"
            name: "stats"
            widget: "object"
            fields:
              - { label: "Established", name: "established", widget: "number", default: 1990 }
              - { label: "Students", name: "students", widget: "number", default: 759 }
              - { label: "Staff", name: "staff", widget: "number", default: 47 }
              - { label: "Student-Teacher Ratio", name: "ratio", widget: "number", default: 5 }
              - { label: "Classrooms", name: "classrooms", widget: "number", default: 13 }
              - { label: "Laboratories", name: "laboratories", widget: "number", default: 2 }
          - label: "Home Facilities (Preview)"
            name: "home_facilities"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Image", name: "image", widget: "image" }
          - label: "Achievements"
            name: "achievements"
            widget: "list"
            fields:
              - { label: "Icon (Font Awesome class)", name: "icon", widget: "string", default: "fa-star" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
          - label: "Gallery (Homepage Preview)"
            name: "gallery"
            widget: "list"
            fields:
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Label", name: "label", widget: "string" }
          - label: "CTA Banner"
            name: "cta_heading"
            widget: "string"
            default: "Ready to Enroll Your Child?"
          - { label: "CTA Text", name: "cta_text", widget: "text" }

  # --------------------------------------------
  # 3. ABOUT
  # --------------------------------------------
  - name: "about"
    label: "About"
    files:
      - name: "about"
        label: "About Page"
        file: "content/about.yml"
        fields:
          - { label: "Hero Image", name: "hero_image", widget: "image" }
          - { label: "Hero Subtitle", name: "hero_subtitle", widget: "text" }
          - { label: "Our Story (supports markdown)", name: "story", widget: "markdown" }
          - { label: "Quick Facts (supports markdown)", name: "quick_facts", widget: "markdown" }
          - { label: "Core Values (List)", name: "core_values", widget: "list", field: { label: "Value", name: "value", widget: "string" } }
          - { label: "Accreditation", name: "accreditation", widget: "text" }

  # --------------------------------------------
  # 4. LEADERSHIP
  # --------------------------------------------
  - name: "leadership"
    label: "Leadership"
    files:
      - name: "leadership"
        label: "Leadership Page"
        file: "content/leadership.yml"
        fields:
          - { label: "Hero Image", name: "hero_image", widget: "image" }
          - { label: "Hero Subtitle", name: "hero_subtitle", widget: "text" }
          - label: "Principal"
            name: "principal"
            widget: "object"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Photo", name: "photo", widget: "image" }
              - { label: "Bio (supports markdown)", name: "bio", widget: "markdown" }
              - { label: "Quote", name: "quote", widget: "text" }
          - label: "Deputy Principals"
            name: "deputies"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Photo", name: "photo", widget: "image" }
              - { label: "Bio (supports markdown)", name: "bio", widget: "markdown" }
          - label: "BOM Chair"
            name: "bom_chair"
            widget: "object"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Photo", name: "photo", widget: "image" }
              - { label: "Message (supports markdown)", name: "message", widget: "markdown" }
          - { label: "Parents Association Status", name: "pa_status", widget: "text" }
          - label: "Heads of Departments (HODs)"
            name: "hods"
            widget: "list"
            fields:
              - { label: "Department", name: "department", widget: "string" }
              - { label: "Icon (Font Awesome class)", name: "icon", widget: "string", default: "fa-user" }
              - { label: "Description", name: "description", widget: "text" }

  # --------------------------------------------
  # 5. ACADEMICS
  # --------------------------------------------
  - name: "academics"
    label: "Academics"
    files:
      - name: "academics"
        label: "Academics Page"
        file: "content/academics.yml"
        fields:
          - { label: "Hero Image", name: "hero_image", widget: "image" }
          - { label: "Hero Subtitle", name: "hero_subtitle", widget: "text" }
          - { label: "Curriculum Overview (supports markdown)", name: "curriculum_overview", widget: "markdown" }
          - label: "Subjects"
            name: "subjects"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
          - { label: "Calendar (supports markdown)", name: "calendar", widget: "markdown" }
          - { label: "Facilities Text", name: "facilities_text", widget: "markdown" }
          - { label: "Achievements (supports markdown)", name: "achievements", widget: "markdown" }
          - label: "Support Programs"
            name: "support_programs"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }

  # --------------------------------------------
  # 6. FACILITIES
  # --------------------------------------------
  - name: "facilities"
    label: "Facilities"
    files:
      - name: "facilities"
        label: "Facilities Page"
        file: "content/facilities.yml"
        fields:
          - { label: "Hero Image", name: "hero_image", widget: "image" }
          - { label: "Hero Subtitle", name: "hero_subtitle", widget: "text" }
          - label: "Facilities List"
            name: "facilities_list"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Image", name: "image", widget: "image" }

  # --------------------------------------------
  # 7. ADMISSIONS
  # --------------------------------------------
  - name: "admissions"
    label: "Admissions"
    files:
      - name: "admissions"
        label: "Admissions Page"
        file: "content/admissions.yml"
        fields:
          - { label: "Hero Image", name: "hero_image", widget: "image" }
          - { label: "Hero Subtitle", name: "hero_subtitle", widget: "text" }
          - { label: "Admission Period", name: "period", widget: "text" }
          - { label: "Requirements (supports markdown)", name: "requirements", widget: "markdown" }
          - label: "Documents Checklist"
            name: "documents"
            widget: "list"
            field: { label: "Document", name: "document", widget: "string" }
          - { label: "Fees Tab (supports markdown)", name: "fees_tab", widget: "markdown" }
          - label: "Step-by-Step Checklist"
            name: "checklist"
            widget: "list"
            field: { label: "Step", name: "step", widget: "string" }
          - { label: "Admissions Phone", name: "admissions_phone", widget: "string" }
          - { label: "Admissions Email", name: "admissions_email", widget: "string" }

  # --------------------------------------------
  # 8. FEES & PAYMENTS
  # --------------------------------------------
  - name: "fees"
    label: "Fees & Payments"
    files:
      - name: "fees"
        label: "Fees Page"
        file: "content/fees.yml"
        fields:
          - { label: "Hero Image", name: "hero_image", widget: "image" }
          - { label: "Hero Subtitle", name: "hero_subtitle", widget: "text" }
          - { label: "Day Scholars (Fee Info)", name: "day_scholars", widget: "text" }
          - { label: "Boarders (Fee Info)", name: "boarders", widget: "text" }
          - { label: "Payment Method", name: "payment_method", widget: "text" }
          - { label: "Bank Details", name: "bank_details", widget: "text" }
          - label: "Payment Instructions"
            name: "payment_instructions"
            widget: "list"
            field: { label: "Instruction", name: "instruction", widget: "string" }
          - label: "Important Notes"
            name: "important_notes"
            widget: "list"
            field: { label: "Note", name: "note", widget: "string" }

  # --------------------------------------------
  # 9. CONTACT
  # --------------------------------------------
  - name: "contact"
    label: "Contact"
    files:
      - name: "contact"
        label: "Contact Page"
        file: "content/contact.yml"
        fields:
          - { label: "Hero Image", name: "hero_image", widget: "image" }
          - { label: "Hero Subtitle", name: "hero_subtitle", widget: "text" }
          - { label: "Physical Address", name: "physical_address", widget: "string" }
          - { label: "Town / County", name: "town_county", widget: "string" }
          - { label: "Google Maps Embed URL", name: "map_embed", widget: "string" }
          - label: "Office Hours"
            name: "office_hours"
            widget: "list"
            field: { label: "Hour Entry", name: "hour", widget: "string" }

  # --------------------------------------------
  # 10. STUDENT LIFE
  # --------------------------------------------
  - name: "student-life"
    label: "Student Life"
    files:
      - name: "student-life"
        label: "Student Life Page"
        file: "content/student-life.yml"
        fields:
          - { label: "Hero Image", name: "hero_image", widget: "image" }
          - { label: "Hero Subtitle", name: "hero_subtitle", widget: "text" }
          - label: "Houses"
            name: "houses"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Color", name: "color", widget: "string", default: "#F2C230" }
              - { label: "Image", name: "image", widget: "image" }

  # --------------------------------------------
  # 11. TESTIMONIALS
  # --------------------------------------------
  - name: "testimonials"
    label: "Testimonials"
    files:
      - name: "testimonials"
        label: "Testimonials"
        file: "content/testimonials.yml"
        fields:
          - label: "Items"
            name: "items"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Role", name: "role", widget: "string" }
              - { label: "Quote", name: "quote", widget: "text" }