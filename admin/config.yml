              - label: "House Name"
                name: "name"
                widget: "string"
              - label: "Image"
                name: "image"
                widget: "image"
            default:
              - name: "Sharmi House"
                image: "/images/gallery/houses_01.jpg"
              - name: "Ndeti House"
                image: "/images/gallery/houses_02.jpg"
              - name: "Chris Yarinakis House"
                image: "/images/gallery/houses_03.jpg"
              - name: "Maina House"
                image: "/images/gallery/houses_04.jpg"
          - label: "Sports Section"
            name: "sports"
            widget: "markdown"
            default: "Coming soon"
          - label: "Clubs & Societies"
            name: "clubs"
            widget: "markdown"
            default: "Coming soon"
          - label: "Boarding Life"
            name: "boarding"
            widget: "markdown"
            default: "Coming soon"
          - label: "Day Schooling"
            name: "day_schooling"
            widget: "markdown"
            default: "Coming soon"

  # ============================================
  # NEWS ARTICLES
  # ============================================
  - name: "news"
    label: "News"
    folder: "content/news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
      - label: "Publish Date"
        name: "date"
        widget: "datetime"
      - label: "Featured Image"
        name: "image"
        widget: "image"
        required: false
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - "Academic"
          - "Sports"
          - "Events"
          - "Announcement"
      - label: "Summary"
        name: "summary"
        widget: "text"
      - label: "Body"
        name: "body"
        widget: "markdown"

  # ============================================
  # TESTIMONIALS
  # ============================================
  - name: "testimonials"
    label: "Testimonials"
    files:
      - file: "content/testimonials.yml"
        label: "Testimonials"
        name: "testimonials"
        fields:
          - label: "Testimonials"
            name: "items"
            widget: "list"
            summary: "{{fields.name}} - {{fields.role}}"
            fields:
              - label: "Name"
                name: "name"
                widget: "string"
              - label: "Role"
                name: "role"
                widget: "select"
                options: ["Parent", "Alumnus", "Staff", "Student"]
              - label: "Quote"
                name: "quote"
                widget: "text"
            default:
              - name: "Mr. John Mwangi"
                role: "Parent"
                quote: "Mavoko Boys has transformed my son's academic performance and character. The teachers are dedicated and the environment is conducive for learning."
              - name: "James Ochieng"
                role: "Alumnus"
                quote: "The quality of education and the holistic development approach at Mavoko Boys is exceptional. I'm proud to be an alumnus of this great institution."
              - name: "Mrs. Grace Wanjiru"
                role: "Parent"
                quote: "The staff at Mavoko Boys are professional and caring. My son has grown both academically and socially since joining this school."

  # ============================================
  # HOMEPAGE ACHIEVEMENTS
  # ============================================
  - name: "homepage_sections"
    label: "Homepage Sections"
    files:
      - file: "content/homepage.yml"
        label: "Homepage Content"
        name: "homepage"
        fields:
          - label: "Stats"
            name: "stats"
            widget: "object"
            fields:
              - label: "Established Year"
                name: "established"
                widget: "number"
                default: 1990
              - label: "Students"
                name: "students"
                widget: "number"
                default: 759
              - label: "Teaching Staff"
                name: "staff"
                widget: "number"
                default: 47
              - label: "Student-Teacher Ratio"
                name: "ratio"
                widget: "number"
                default: 5
                value_type: "float"
              - label: "Classrooms"
                name: "classrooms"
                widget: "number"
                default: 13
              - label: "Laboratories"
                name: "laboratories"
                widget: "number"
                default: 2
          - label: "Gallery Images"
            name: "gallery"
            widget: "list"
            summary: "{{fields.label}}"
            fields:
              - label: "Image"
                name: "image"
                widget: "image"
              - label: "Label"
                name: "label"
                widget: "string"
            default:
              - image: "/images/gallery/students_campus_01.jpg"
                label: "Campus Life"
              - image: "/images/gallery/students_campus_02.jpg"
                label: "Classroom"
              - image: "/images/gallery/students_campus_03.jpg"
                label: "Sports"
              - image: "/images/gallery/students_campus_04.jpg"
                label: "Assembly"
              - image: "/images/gallery/students_campus_05.jpg"
                label: "Facilities"
              - image: "/images/gallery/students_campus_06.jpg"
                label: "Events"
          - label: "Achievements"
            name: "achievements"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - label: "Icon"
                name: "icon"
                widget: "string"
                hint: "Font Awesome class, e.g., fa-laptop-code"
              - label: "Title"
                name: "title"
                widget: "string"
              - label: "Description"
                name: "description"
                widget: "text"
            default:
              - icon: "fa-laptop-code"
