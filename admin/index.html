<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Staff Login | Mavoko Boys School</title>
    <link rel="icon" type="image/png" href="/images/branding/favicon.png" />
    <style>
        :root {
            --primary: #1a3a6b;
            --gold: #c8963e;
            --white: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-container {
            background: var(--white);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .login-container img {
            width: 80px;
            margin-bottom: 1rem;
        }
        .login-container h1 {
            color: var(--primary);
            margin-bottom: 0.5rem;
            font-size: 1.5rem;
        }
        .login-container p {
            color: #555;
            margin-bottom: 2rem;
        }
        #staff-login-btn {
            background: var(--primary);
            color: var(--white);
            border: none;
            padding: 0.8rem 2rem;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
            width: 100%;
        }
        #staff-login-btn:hover {
            background: #0e2a4d;
        }
        .error-message {
            color: red;
            margin-top: 1rem;
        }
    </style>
    <!-- Load Netlify Identity widget -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
    <div class="login-container">
        <!-- You can replace the src with your actual logo if you have one -->
        <img src="/images/branding/logo_placeholder.svg" alt="School Logo" onerror="this.style.display='none'" />
        <h1>Mavoko Boys School</h1>
        <p>Content Management System</p>
        <button id="staff-login-btn">Staff Login</button>
        <div id="error-message" class="error-message"></div>
    </div>

    <script>
        // Wait for the page to load
        window.addEventListener('load', function() {
            const loginBtn = document.getElementById('staff-login-btn');
            const errorEl = document.getElementById('error-message');

            // Check if Netlify Identity loaded
            if (!window.netlifyIdentity) {
                errorEl.textContent = 'Login service failed to load. Please refresh the page.';
                loginBtn.disabled = true;
                return;
            }

            // Initialize the widget
            window.netlifyIdentity.init();

            // When the widget is ready, handle user state
            window.netlifyIdentity.on('init', function(user) {
                if (user) {
                    // User is already logged in – redirect to the CMS dashboard
                    window.location.href = '/admin/#/';
                } else {
                    // Not logged in – the button will open the login/signup modal
                }
            });

            // When login completes, redirect to the CMS dashboard
            window.netlifyIdentity.on('login', function() {
                window.location.href = '/admin/#/';
            });

            // When signup completes (invite acceptance), also redirect
            window.netlifyIdentity.on('signup', function() {
                window.location.href = '/admin/#/';
            });

            // Open the Netlify Identity modal on button click
            loginBtn.addEventListener('click', function() {
                window.netlifyIdentity.open();
            });
        });
    </script>
</body>
</html>
