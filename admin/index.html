<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Manager | Mavoko Boys School</title>
    <link rel="icon" type="image/png" href="/images/branding/favicon.png" />
    <style>
        :root { --primary: #1a3a6b; --gold: #c8963e; }
        body { margin: 0; padding: 0; }
        /* Hide the default Decap CMS login button */
        .css-1b7q5qj-StyledAuthenticationPage button {
            display: none !important;
        }
        /* Our custom login button */
        .custom-login-btn {
            display: block;
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            text-align: center;
        }
        .custom-login-btn:hover {
            opacity: 0.9;
        }
    </style>
    <!-- Load Netlify Identity widget first -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
    <script>
        // Initialize the identity widget
        if (window.netlifyIdentity) {
            window.netlifyIdentity.on("init", function(user) {
                if (!user) {
                    // No user logged in – the widget is ready to show forms
                }
                window.netlifyIdentity.on("login", function() {
                    document.location.reload();
                });
            });
            window.netlifyIdentity.init();
        }
    </script>

    <!-- Decap CMS -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
        CMS.registerPreviewStyle('/css/styles.css');

        // Wait for Decap CMS to render the login page, then inject our custom button
        window.addEventListener('load', function() {
            // The Decap login button appears after CMS loads; we replace it
            setTimeout(function() {
                var decapButton = document.querySelector('[class*="StyledAuthenticationPage"] button');
                if (decapButton) {
                    // Hide the original
                    decapButton.style.display = 'none';
                    // Create our button
                    var btn = document.createElement('button');
                    btn.className = 'custom-login-btn';
                    btn.textContent = 'Staff Login';
                    btn.onclick = function(e) {
                        e.preventDefault();
                        if (window.netlifyIdentity) {
                            window.netlifyIdentity.open();
                        } else {
                            alert('Login service is loading. Please refresh the page.');
                        }
                    };
                    // Insert after the hidden button
                    decapButton.parentNode.insertBefore(btn, decapButton.nextSibling);
                }
            }, 500);
        });
    </script>
</body>
</html>
