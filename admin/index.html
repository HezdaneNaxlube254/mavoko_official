<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Manager | Mavoko Boys School</title>
    <link rel="icon" type="image/png" href="/images/branding/favicon.png" />
    <style>
        /* Custom branding for CMS login page */
        :root {
            --primary: #1a3a6b;
            --gold: #c8963e;
        }
        body {
            margin: 0;
            padding: 0;
        }
        /* Customize the Decap CMS frame header */
        [class*="css"] .AppHeader {
            background-color: var(--primary) !important;
        }
    </style>
</head>
<body>
    <!-- Include Decap CMS from CDN -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    
    <!-- Custom preview styles (optional) -->
    <script>
        // Register a custom preview style for the CMS
        CMS.registerPreviewStyle('/css/styles.css');
    </script>
</body>
</html>
