[build]
  publish = "."

# Correctly passes the email confirmation token directly to the admin folder
[[redirects]]
  from = "/"
  query = { invite_token = ":token" }
  to = "/admin/"
  status = 200

# Security and clean loading headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
