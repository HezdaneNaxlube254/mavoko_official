[build]
  publish = "."

# Redirect invite tokens to admin
[[redirects]]
  from = "/"
  to = "/admin/"
  status = 200
  force = true
  query = { invite_token = ":token" }

# CMS admin page fallback
[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"